<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- Settings/Gear Icon -->
  <symbol id="icon-gear" viewBox="0 0 24 24">
    <path d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7z"/>
    <path d="M19.4 13.3a7.9 7.9 0 0 0 0-2.6l2.1-1.6-2-3.5-2.5 1a8 8 0 0 0-2.2-1.3L14 1h-4l-.8 3.3a8 8 0 0 0-2.2 1.3l-2.5-1L1.5 9.1l2.1 1.6a7.9 7.9 0 0 0 0 2.6L1.5 14.9l2 3.5 2.5-1a8 8 0 0 0 2.2 1.3L10 23h4l.8-3.3a8 8 0 0 0 2.2-1.3l2.5 1 2-3.5-2.1-1.6z"/>
  </symbol>

  <!-- Rocket Icon -->
  <symbol id="icon-rocket" viewBox="0 0 24 24">
    <path d="M12 2s4 1 6 3 3 6 3 6-3 0-6 2-6 6-6 6-3-4-3-6S6 4 12 2z"/>
    <circle cx="10" cy="10" r="1.5"/>
  </symbol>

  <!-- Image Icon -->
  <symbol id="icon-image" viewBox="0 0 24 24">
    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"/>
    <circle cx="8.5" cy="8.5" r="1.5"/>
    <path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="2" fill="none"/>
  </symbol>

  <!-- Check/Success Icon -->
  <symbol id="icon-check" viewBox="0 0 24 24">
    <polyline points="20 6 9 17 4 12" fill="none" stroke="currentColor" stroke-width="2"/>
  </symbol>

  <!-- AI/Brain Icon -->
  <symbol id="icon-brain" viewBox="0 0 24 24">
    <path d="M9.5 2c-1.82 0-3.53.5-5 1.35C7.99 5.08 10 8.3 10 12c0 3.7-2.01 6.92-5 8.65C6.47 21.5 8.18 22 10 22c5.52 0 10-4.48 10-10S15.52 2 10 2z"/>
    <path d="M14.5 2c1.82 0 3.53.5 5 1.35C16.01 5.08 14 8.3 14 12c0 3.7 2.01 6.92 5 8.65-1.47.85-3.18 1.35-5 1.35-5.52 0-10-4.48-10-10S8.98 2 14.5 2z"/>
  </symbol>

  <!-- Upload Icon -->
  <symbol id="icon-upload" viewBox="0 0 24 24">
    <path d="M3 17v4h18v-4M12 3v14M7 8l5-5 5 5" fill="none" stroke="currentColor" stroke-width="2"/>
  </symbol>

  <!-- Key Icon -->
  <symbol id="icon-key" viewBox="0 0 24 24">
    <circle cx="7" cy="17" r="4" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M10 15l11-11M21 4l-3 3" stroke="currentColor" stroke-width="2"/>
  </symbol>
</svg>

